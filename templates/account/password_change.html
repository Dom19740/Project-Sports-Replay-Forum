{% extends "base_1.html" %}
{% load i18n crispy_forms_tags %}

{% block title %}Change Password | Should I Watch Sports{% endblock %}

{% block main_container_top %}
<h6>Change Password</h6>

<form method="POST" action="{% url 'account_change_password' %}" class="form-group">
    {% csrf_token %}
    {{ redirect_field }}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary">Change Password</button>
    <a href="{% url 'users:password_reset' %}" class="ms-3 small">Forgot Password</a>
</form>
{% endblock %}
