{% load event_tags %}
{% load static %}

<div {% if has_voted %}style="display: none;"{% endif %}>
    <h6 class="section-label">Rate the Event</h6>
    {% if event|is_past and not event|voting_closed %}
        <form method="post" action="{% url 'core:vote' event.id %}" class="vote mt-2">
            {% csrf_token %}
            <input type="radio" name="stars" id="stars5" value="5" required>
            <label for="stars5"><span class="ai-stars ai-stars-5">★</span> 5 stars - <img src="{% static 'img/logo_flame_small.png' %}" alt="" class="vote-verdict-icon"><strong class="vote-verdict">HOT WATCH!</strong></label>

            <input type="radio" name="stars" id="stars4" value="4">
            <label for="stars4"><span class="ai-stars ai-stars-4">★</span> 4 stars</label>

            <input type="radio" name="stars" id="stars3" value="3">
            <label for="stars3"><span class="ai-stars ai-stars-3">★</span> 3 stars - <img src="{% static 'img/logo_mid_small.png' %}" alt="" class="vote-verdict-icon"><strong class="vote-verdict">MID TEMP!</strong></label>

            <input type="radio" name="stars" id="stars2" value="2">
            <label for="stars2"><span class="ai-stars ai-stars-2">★</span> 2 stars</label>

            <input type="radio" name="stars" id="stars1" value="1">
            <label for="stars1"><span class="ai-stars ai-stars-1">★</span> 1 star - <img src="{% static 'img/logo_cold_small.png' %}" alt="" class="vote-verdict-icon"><strong class="vote-verdict">NOT WATCH!</strong></label>

            <button type="submit" class="btn btn-primary text-white mt-3 w-100">Submit Rating</button>
        </form>
    {% else %}
        <p>Rating opens 45 minutes after the event starts and is available for 7 days.</p>
    {% endif %}
</div>

<div id="voted-container" {% if has_voted %}style="display: block;"{% else %}style="display: none;"{% endif %}>
    <p class="text-muted small">Thanks for rating!</p>
</div>
