{% load static %}
<div class="events-list">
    <h6 class="inside-header">Recent</h6>

    {% for event in events_past %}
      <li>
        <a href="{% url 'core:event' event.id %}" class="btn-pill btn-pill-light rounded-pill">
            {{ event.event_type|title }}{% if event.rating.average_stars >= 4 %} <img src="{% static 'img/logo_flame_large.png' %}" class="rating-pill-icon" alt="Hot">{% elif event.rating.average_stars >= 2 %} <img src="{% static 'img/logo_mid.png' %}" class="rating-pill-icon" alt="Mid">{% elif event.rating.average_stars %} <img src="{% static 'img/logo_cold.png' %}" class="rating-pill-icon" alt="Not">{% endif %}
        </a>
      </li>
    {% endfor %}

</div>
